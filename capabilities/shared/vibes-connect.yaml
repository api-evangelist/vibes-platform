naftiko: "1.0.0-alpha1"

info:
  label: "Vibes Connect API"
  description: >-
    The Vibes Connect HTTP Message API enables sending and receiving SMS and MMS
    messages via HTTP calls. Vibes is a Tier 1 carrier with direct connections
    to Verizon, AT&T, T-Mobile, and regional providers in the US and Canada.
  tags:
    - SMS
    - MMS
    - Aggregation
    - Mobile Messaging
    - Carrier Connectivity
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VIBES_CONNECT_USERNAME: VIBES_CONNECT_USERNAME
      VIBES_CONNECT_PASSWORD: VIBES_CONNECT_PASSWORD

capability:
  consumes:
    - type: http
      namespace: vibes-connect
      baseUri: https://messageapi.vibesapps.com
      description: "Vibes Connect aggregation API for SMS/MMS sending and carrier lookup."
      authentication:
        type: basic
        username: "{{VIBES_CONNECT_USERNAME}}"
        password: "{{VIBES_CONNECT_PASSWORD}}"
      resources:
        - name: sms-messages
          path: /api/v1/sms/messages
          description: "Send SMS messages."
          operations:
            - name: send-sms-message
              method: POST
              description: "Send an SMS message to a mobile number."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  to: "{{tools.to}}"
                  from: "{{tools.from}}"
                  text: "{{tools.text}}"
                  callback_url: "{{tools.callback_url}}"

        - name: mms-messages
          path: /api/v1/mms/messages
          description: "Send MMS messages with multimedia content."
          operations:
            - name: send-mms-message
              method: POST
              description: "Send an MMS message with pictures, links, or other media."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  to: "{{tools.to}}"
                  from: "{{tools.from}}"
                  subject: "{{tools.subject}}"
                  content: "{{tools.content}}"

        - name: carrier-lookup
          path: /api/v1/carrier-lookup
          description: "Retrieve carrier information for mobile numbers."
          operations:
            - name: lookup-carrier
              method: POST
              description: "Retrieve carrier information and number type for a mobile number."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  mobile_number: "{{tools.mobile_number}}"

  exposes:
    - type: rest
      port: 8101
      namespace: vibes-connect-api
      resources:
        - path: /v1/sms-messages
          name: sms-messages
          description: "Send SMS messages."
          operations:
            - method: POST
              name: send-sms-message
              description: "Send an SMS message."
              call: "vibes-connect.send-sms-message"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: vibes-connect-mcp
      transport: http
      tools:
        - name: send-sms-message
          description: "Send an SMS message to a mobile number."
          hints:
            readOnly: false
            destructive: false
          call: "vibes-connect.send-sms-message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-mms-message
          description: "Send an MMS message with multimedia content."
          hints:
            readOnly: false
            destructive: false
          call: "vibes-connect.send-mms-message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: lookup-carrier
          description: "Look up carrier information for a mobile number."
          hints:
            readOnly: true
            openWorld: true
          call: "vibes-connect.lookup-carrier"
          outputParameters:
            - type: object
              mapping: "$."
